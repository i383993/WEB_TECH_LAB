<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Mass Index (BMI)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #e6f7ff;
        }
        .container {
            background-color: #007bb5;
            color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            width: 380px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h2 {
            margin: 0;
            font-size: 1.8em;
        }
        p {
            margin: 5px 0 0;
            font-size: 0.9em;
            opacity: 0.8;
        }
        .separator {
            border: 0;
            height: 1px;
            background-color: #005f99;
            margin: 20px 0;
        }
        .input-section {
            display: flex;
            flex-direction: column;
        }
        .input-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .input-group label {
            flex: 1;
            font-size: 1.1em;
            text-align: left;
        }
        .input-group input {
            flex: 2;
            padding: 10px;
            border: none;
            border-radius: 5px;
            text-align: right;
            font-size: 1em;
            background-color: #f0f8ff;
            color: #333;
        }
        .input-group span {
            margin-left: 10px;
            font-weight: bold;
            font-size: 1.1em;
        }
        .result-section {
            background-color: #006b99;
            padding: 25px 20px;
            border-radius: 8px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }
        #bmi-value {
            font-size: 3.5em;
            font-weight: bold;
            margin: 0;
        }
        #bmi-status {
            font-size: 1.5em;
            font-weight: 500;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Body mass index (BMI)</h2>
            <p>A measure of body fat in adults</p>
        </div>
        <hr class="separator">
        
        <div class="input-section">
            <div class="input-group">
                <label for="weight">Weight</label>
                <input type="number" id="weight" value="80" oninput="calculateBMI()">
                <span>kg</span>
            </div>
            <div class="input-group">
                <label for="height">Height</label>
                <input type="number" id="height" value="170" oninput="calculateBMI()">
                <span>cm</span>
            </div>
        </div>
        
        <div class="result-section">
            <p id="bmi-value">27.7</p>
            <p id="bmi-status">Overweight BMI</p>
        </div>
    </div>

    <script>
        function calculateBMI() {
            // Get user input for weight in kilograms and height in centimeters
            const weight = parseFloat(document.getElementById('weight').value);
            const heightCm = parseFloat(document.getElementById('height').value);
            
            // Check for valid input
            if (isNaN(weight) || isNaN(heightCm) || weight <= 0 || heightCm <= 0) {
                document.getElementById('bmi-value').textContent = '0.0';
                document.getElementById('bmi-status').textContent = 'Invalid Input';
                return;
            }

            // Convert height from cm to meters
            const heightM = heightCm / 100;
            
            // Calculate BMI using the formula: BMI = weight / (height * height)
            const bmi = weight / (heightM * heightM);
            let status = '';

            // Determine the BMI status based on the provided criteria
            if (bmi < 18) {
                status = 'Underweight';
            } else if (bmi >= 18 && bmi < 25) {
                status = 'Normal';
            } else if (bmi >= 25 && bmi < 30) {
                status = 'Overweight';
            } else { // bmi >= 30
                status = 'Obese';
            }

            // Display the results
            document.getElementById('bmi-value').textContent = bmi.toFixed(1);
            document.getElementById('bmi-status').textContent = status;
        }

        // Call the function on page load to display the initial values
        calculateBMI();
    </script>
</body>
</html>
