<!DOCTYPE html>
<html>
<head>
    <title>Gym Membership Form - URK23CS1010</title>
</head>
<body>

    <h1>FlexFit Gym</h1>
    <h2>Membership Enrollment Form</h2>

    <form action="/gymEnrollment" method="post">
        <fieldset>
            <legend>Personal Information</legend>

            <label for="fullname">Full Name:</label><br>
            <input type="text" id="fullname" name="fullname" required><br><br>

            <label for="contact">Contact Number:</label><br>
            <input type="tel" id="contact" name="contact" pattern="[0-9]{10}" required><br><br>

            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" required><br><br>
        </fieldset>

        <br>

        <fieldset>
            <legend>Membership Duration</legend>

            <input type="radio" id="1m" name="duration" value="1 Month" required>
            <label for="1m">1 Month</label><br>

            <input type="radio" id="3m" name="duration" value="3 Months">
            <label for="3m">3 Months</label><br>

            <input type="radio" id="6m" name="duration" value="6 Months">
            <label for="6m">6 Months</label><br>

            <input type="radio" id="1y" name="duration" value="1 Year">
            <label for="1y">1 Year</label><br>
        </fieldset>

        <br>

        <fieldset>
            <legend>Workout Program</legend>

            <label for="program">Choose a Program:</label><br>
            <select id="program" name="program" required>
                <option value="">--Select--</option>
                <option value="wt">Weight Training</option>
                <option value="cardio">Cardio</option>
                <option value="yoga">Yoga</option>
                <option value="mixed">Mixed</option>
            </select>
        </fieldset>

        <br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
