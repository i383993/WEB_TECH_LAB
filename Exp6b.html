<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e6f7ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #f0f8ff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #cce6ff;
        }
        h2 {
            color: #007acc;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1em;
        }
        .result-box {
            background-color: #e9f5e9;
            border: 1px solid #c8e6c9;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 1.1em;
        }
        .result-item strong {
            color: #388e3c;
        }
        button {
            padding: 10px 20px;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 15px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #005f99;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            // Function to calculate GST and update display
            function calculateGST() {
                const amount = parseFloat($("#amount").val()) || 0;
                const gstRate = parseFloat($("#gst-rate").val()) || 0;

                const gstAmount = (amount * (gstRate / 100)).toFixed(2);
                const totalAmount = (amount + parseFloat(gstAmount)).toFixed(2);
                
                $("#actual-amount").text(amount.toFixed(2));
                $("#gst-amount").text(gstAmount);
                $("#total-amount").text(totalAmount);
            }

            // Bind the calculation function to keyup and change events
            $("#amount").keyup(calculateGST);
            $("#gst-rate").change(calculateGST);
            
            // Handle the reset button click
            $("#resetBtn").click(function() {
                $("#amount").val('');
                $("#gst-rate").val('3'); // Set to default 3%
                $("#actual-amount").text("0.00");
                $("#gst-amount").text("0.00");
                $("#total-amount").text("0.00");
            });

            // Initial calculation on page load to show default values
            calculateGST();
        });
    </script>
</head>
<body>
    <div class="container">
        <h2>GST Calculator</h2>

        <div class="form-group">
            <label for="amount">Amount:</label>
            <input type="number" id="amount" placeholder="e.g., 20000" value="20000">
        </div>
        
        <div class="form-group">
            <label for="gst-rate">GST (%):</label>
            <select id="gst-rate">
                <option value="3" selected>3%</option>
                <option value="5">5%</option>
                <option value="12">12%</option>
                <option value="18">18%</option>
                <option value="28">28%</option>
            </select>
        </div>

        <div class="result-box">
            <div class="result-item">
                <span>Actual Amount:</span>
                <strong><span id="actual-amount">0.00</span></strong>
            </div>
            <div class="result-item">
                <span>GST:</span>
                <strong><span id="gst-amount">0.00</span></strong>
            </div>
            <div class="result-item">
                <span>Total:</span>
                <strong><span id="total-amount">0.00</span></strong>
            </div>
        </div>
        
        <button id="resetBtn">Reset</button>
    </div>
</body>
</html>
